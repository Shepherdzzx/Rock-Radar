<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Radar - 游戏评测雷达图</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap");
        /* 引入鸿蒙字体 (使用更稳定的全局地址) */
        @import url("https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/harmonyos-sans/1.1.0/style.css");

        :root {
            --theme-color: #00ffff;
            --bg-color-1: #0f1015;
            --bg-color-2: #1a1a2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: "HarmonyOS Sans SC", "PingFang SC", "Lantinghei SC", "Microsoft YaHei", "HanHei SC", "Helvetica Neue", "Open Sans", Arial, sans-serif; 
            overflow: hidden; 
            background-color: #000;
            background-image: linear-gradient(135deg, var(--bg-color-1), var(--bg-color-2), #050508, #111);
            background-size: 400% 400%;
            animation: gradientBG 30s ease infinite; 
            color: #fff; 
            transition: all 2s ease; 
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: -1;
        }

        body.particles-disabled {
            background-image: none !important;
            animation: none !important;
        }

        #particles-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1005; /* 初始置顶以显示粒子 */
            pointer-events: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 0;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            width: min(100vw, calc(100vh * 9 / 16));
            height: 100vh;
            position: relative;
        }

        .top-panel {
            flex: 0 0 40vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .middle-panel {
            flex: 0 0 40vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: visible;
        }

        #radarCanvas {
            width: min(90%, 37vh);
            height: auto;
            aspect-ratio: 1/1;
            transform: scale(1.3);
            max-width: 600px;
        }

        .bottom-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1vh 2vw;
            gap: 1.2vh;
        }

        .game-name {
            font-family: "Orbitron", "HarmonyOS Sans SC", sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 8px var(--theme-color);
            transition: all 2s ease;
            animation: nameEntrance 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes nameEntrance {
            0% { opacity: 0; transform: scale(0.5) translateZ(-200px); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1) translateZ(0); filter: blur(0); }
        }

        .game-photo-container {
            width: 90%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1200px;
        }

        .game-photo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            opacity: 0;
            transform: scale(0.3) translateZ(-500px);
            transition: opacity 1.2s ease, transform 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Grade badges row */
        .grade-badges-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5vw;
            width: 100%;
            transition: opacity 0.5s ease;
        }

        .grade-badge {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-width: 48px;
        }

        .grade-badge .grade-letter {
            font-family: "Orbitron", sans-serif;
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--theme-color);
            text-shadow: 0 0 10px var(--theme-color);
            transition: all 2s ease;
        }

        .grade-badge .grade-dim-name {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.6);
            white-space: nowrap;
        }

        /* Overall grade display */
        .overall-grade {
            font-family: "Orbitron", sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--theme-color);
            text-shadow: 0 0 20px var(--theme-color), 0 0 40px var(--theme-color);
            transition: all 2s ease;
            animation: overallEntrance 1.2s cubic-bezier(0.23, 1, 0.32, 1) 0.15s forwards;
        }

        @keyframes overallEntrance {
            0% { opacity: 0; transform: scale(0.3); filter: blur(10px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .game-desc-container {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 8px;
            transition: all 2s ease;
            max-width: 90%;
            opacity: 0;
            animation: descEntrance 1s ease-out 0.3s both;
        }

        @keyframes descEntrance {
            0% { opacity: 0; transform: scale(0.8) translateZ(-100px); }
            100% { opacity: 1; transform: scale(1) translateZ(0); }
        }

        .game-desc {
            font-size: 1.2rem;
            line-height: 1.3;
            color: rgba(255, 255, 255, 0.85);
            transition: all 2s ease;
        }

        /* 底部全局进度条 */
        .global-timeline-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.05);
            z-index: 100;
            cursor: pointer;
        }

        .global-timeline-bar {
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--theme-color));
            width: 0%;
            transition: width 0.1s linear, background 2s ease;
            position: relative;
        }

        .global-timeline-bar::after {
            content: "";
            position: absolute;
            right: 0; top: 50%;
            transform: translateY(-50%);
            width: 4px; height: 100%;
            background: #fff;
            box-shadow: 0 0 10px #fff;
        }

        .timeline-tooltip {
            position: absolute;
            bottom: 25px;
            color: #fff;
            padding: 5px 10px;
            font-family: "Orbitron", "HarmonyOS Sans SC", sans-serif;
            font-size: 0.9rem;
            pointer-events: none;
            display: none;
            z-index: 101;
            text-align: center;
            text-shadow: 0 0 10px var(--theme-color), 0 0 5px #000;
            white-space: pre; /* 支持换行显示显示乐队名 */
        }

        /* 准备页面 */
        #introOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #000;
            z-index: 1002; /* 必须比粒子 canvas 还要高，才能挡住雷达 */
            transition: opacity 1s ease;
            pointer-events: none;
            opacity: 1; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #introOverlay::after {
            content: "按空格开始";
            color: rgba(255, 255, 255, 0.4);
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            font-size: 1.5rem;
            letter-spacing: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.2; }
            50% { opacity: 0.8; }
            100% { opacity: 0.2; }
        }

        #introOverlay.started::after {
            display: none;
        }

        .session-timer {
            position: fixed;
            bottom: 20px;
            right: 30px;
            font-family: "Orbitron", sans-serif;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
            z-index: 10;
        }

        /* 全屏模式下的 UI 隐藏 */
        :fullscreen body { cursor: none; }
        :fullscreen .global-timeline-container,
        :fullscreen #globalTimeline,
        :fullscreen .session-timer {
            display: none !important;
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.8) translateZ(-100px);
            transition: all 0.5s ease-in;
        }

        /* 特色游戏底图容器 */
        .featured-bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .featured-bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: left center;
            -webkit-mask-image: linear-gradient(to right, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0) 100%);
            mask-image: linear-gradient(to right, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0) 100%);
            transition: transform 2.5s cubic-bezier(0.16, 1, 0.3, 1), opacity 2.5s ease;
            transform: translateX(-100%);
            opacity: 0;
        }

        .featured-bg-image.active {
            opacity: 1;
            transform: translateX(0);
        }

        .featured-bg-image.exit {
            transform: translateX(0);
            opacity: 0;
        }
    </style>
</head>
<body>
    <audio id="bgMusic" src="music.mp3"></audio>
    <div id="introOverlay"></div>

    <div id="featuredBgContainer" class="featured-bg-container"></div>

    <canvas id="particles-canvas"></canvas>
    <div class="session-timer" id="sessionTimer">00:00:00</div>

    <div class="container">
        <div class="main-layout">
            <div class="top-panel">
                <div class="game-photo-container" id="photoContainer">
                    <img id="gamePhoto" class="game-photo" src="" alt="">
                </div>
            </div>
            <div class="middle-panel">
                <canvas id="radarCanvas" width="1600" height="1600"></canvas>
            </div>
            <div class="bottom-panel">
                <div class="game-name" id="gameName"></div>
                <div class="grade-badges-row" id="gradeBadgesRow"></div>
                <div class="overall-grade" id="overallGrade"></div>
                <div class="game-desc-container" id="descContainer">
                    <div class="game-desc" id="gameDesc"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="global-timeline-container" id="globalTimeline">
        <div class="global-timeline-bar" id="globalBar"></div>
        <div class="timeline-tooltip" id="timelineTooltip">00:00</div>
    </div>

    <script>
        const COLOR_PRESETS = [
            { color: "#00ffff", bg1: "#001a1a", bg2: "#000d0d" }, // 青色系
            { color: "#ff00ff", bg1: "#1a001a", bg2: "#0d000d" }, // 洋红色系
            { color: "#ffff00", bg1: "#1a1a00", bg2: "#0d0d00" }, // 黄色系
            { color: "#00ff00", bg1: "#001a00", bg2: "#000d00" }, // 绿色系
            { color: "#ff4500", bg1: "#1a0700", bg2: "#0d0300" }, // 橙红色系
            { color: "#1e90ff", bg1: "#000f1a", bg2: "#00070d" }, // 道奇蓝
            { color: "#ff0040", bg1: "#1a0006", bg2: "#0d0003" }, // 玫红色系
            { color: "#7cfc00", bg1: "#0c1a00", bg2: "#060d00" }, // 草绿色系
            { color: "#ba55d3", bg1: "#13091a", bg2: "#09040d" }, // 中兰花紫
            { color: "#40e0d0", bg1: "#061a18", bg2: "#030d0c" }, // 绿松石系
            { color: "#f08080", bg1: "#1a0e0e", bg2: "#0d0707" }, // 浅珊瑚红
            { color: "#00fa9a", bg1: "#001a10", bg2: "#000d08" }, // 中春绿色
            { color: "#ff8c00", bg1: "#1a0e00", bg2: "#0d0700" }, // 深橙色系
            { color: "#9370db", bg1: "#0f0b1a", bg2: "#07050d" }, // 中紫色系
            { color: "#00ced1", bg1: "#00151a", bg2: "#000a0d" }, // 深青色系
            { color: "#ff1493", bg1: "#1a0210", bg2: "#0d0108" }, // 深粉色系
            { color: "#adff2f", bg1: "#111a03", bg2: "#080d01" }, // 黄绿色系
            { color: "#b0c4de", bg1: "#12141a", bg2: "#090a0d" }, // 亮钢兰
            { color: "#eea2ad", bg1: "#1a1112", bg2: "#0d0809" }, // 浅粉红
            { color: "#00bfff", bg1: "#00131a", bg2: "#00090d" }  // 深天空蓝
        ];

        let colorPool = [...COLOR_PRESETS].sort(() => Math.random() - 0.5);
        let colorIndex = 0;

        // 全局配置参数
        const CONFIG = {
            RADAR_SCALE: 1.0,            // 雷达图底图大小缩放比例 (默认1.0)
            RADAR_GRID_LEVELS: 5,        // 雷达图底图行数（圈数）
            RADAR_GRID_LINE_WIDTH: 3,    // 雷达图底图线条粗细
            RADAR_GRID_LINE_OPACITY: 0.15, // 雷达图底图线条透明度
            PARTICLE_OPACITY_MULT: 1.2,  // 背景粒子特效透明度倍率
            PARTICLE_SIZE_MULT: 1.2,     // 背景粒子特效大小倍率
            VERTEX_COUNT: 6,             // 雷达图顶点数
            INTRO_WAIT_TIME: 1000,       // 开头准备页等待时间 (ms)

            // 雷达图各个维度的名称
            DIM_NAMES: ["剧情", "玩法", "色气", "体量", "创新性", "CG质量"],

            // 字母评级对应的雷达图半径比例
            GRADE_POSITIONS: { 'S': 0.9, 'A': 0.7, 'B': 0.5, 'C': 0.3, 'D': 0.1 },

            // 满分基准（统一为1，对应半径的100%）
            BASE_MAX_SCORES: [1, 1, 1, 1, 1, 1],
            MIN_SCORES: [0, 0, 0, 0, 0, 0],

            ANIM_DURATION: 1500,         // 雷达各项数值生长动画的过渡时间 (ms)
            DEFAULT_DURATION: 8000,      // 默认每页的展示时长 (ms)
            SHOW_DESC: true,             // 是否显示描述文字
            LABEL_MARGIN: 60,            // 维度名称距离雷达图外圈的距离 (px)
            LABEL_FONT_SIZE: 24,         // 维度名称字体大小 (px)
            SCORE_FONT_SIZE: 22,         // 评分数值字体大小 (px)
        };

        function getNextColor() {
            const c = colorPool[colorIndex];
            colorIndex = (colorIndex + 1) % colorPool.length;
            if (colorIndex === 0) colorPool.sort(() => Math.random() - 0.5);
            return c;
        }

        // 将字母评级映射为雷达图位置 (0-1 归一化值)
        function gradeToPosition(grade) {
            return CONFIG.GRADE_POSITIONS[grade] || 0;
        }

        const featuredList = [];

        // 游戏评测数据
        // grades: [剧情, 玩法, 色气, 体量, 创新性, CG质量] 各维度字母评级 S/A/B/C/D
        // overallGrade: 综合评级
        // desc: 评测描述
        // colorIndex: 对应 COLOR_PRESETS 索引 (0-19)
        // duration: 该条目持续显示时间 (ms)，默认由 CONFIG.DEFAULT_DURATION 决定
        const gamelist = [

{ name: "赛博朋克2077", grades: ['A', 'B', 'A', 'S', 'B', 'S'], overallGrade: 'A', desc: "夜之城的传奇，虽有缺陷但无可替代", colorIndex: 2, duration: 8000 },
{ name: "Elden Ring", grades: ['B', 'S', 'C', 'S', 'S', 'S'], overallGrade: 'S', desc: "交界地的史诗，开放世界的标杆", colorIndex: 5, duration: 8000 },
{ name: "原神", grades: ['S', 'A', 'S', 'S', 'A', 'S'], overallGrade: 'S', desc: "国产之光，持续进化的提瓦特", colorIndex: 0, duration: 8000 },
{ name: "守望先锋", grades: ['C', 'S', 'A', 'B', 'A', 'S'], overallGrade: 'A', desc: "英雄永存，需要更多新内容", colorIndex: 3, duration: 8000 },
        ];

        const games = gamelist.map(g => {
            const preset = (g.colorIndex !== undefined) ? COLOR_PRESETS[g.colorIndex] : getNextColor();

            return {
                ...g,
                // 将字母评级转换为归一化位置值用于雷达动画
                points: g.grades.map(grade => gradeToPosition(grade)),
                isFeatured: featuredList.includes(g.name),
                duration: g.duration || CONFIG.DEFAULT_DURATION,
                ...preset
            };
        });

        // 时间轴计算
        let totalDuration = games.reduce((acc, g) => acc + g.duration, 0);
        let timeSegments = [];
        let accumulatedTime = 0;
        games.forEach((g, i) => {
            timeSegments.push({ start: accumulatedTime, end: accumulatedTime + g.duration, gameIndex: i });
            accumulatedTime += g.duration;
        });

        const ANIM_DURATION = CONFIG.ANIM_DURATION;

        // 获取当前游戏的字母评级（用于雷达图标签显示）
        function getGradeLabel(index) {
            if (currentIndex !== -1 && games[currentIndex]) {
                return games[currentIndex].grades[index];
            }
            return '';
        }

        let currentIndex = -1;
        let isGlobalTimelineDragging = false;
        let globalCurrentTime = 0; // ms
        let isParticlesEnabled = true;
        let particleFadeLevel = 1; // 1 为完全显示，0 为完全消失
        let isPaused = true;
        let isStarted = false; // 是否已经按过空格开始
        let lastTimestamp = 0;

        let currentThemeColor = "#00ffff";
        let targetThemeColor = "#00ffff"; 
        let currentScores = [...CONFIG.MIN_SCORES];
        let startScores = [...CONFIG.MIN_SCORES];
        let targetScores = [...CONFIG.MIN_SCORES];
        let animProgress = 1;
        let animStartTime = 0;
        let startTime = Date.now();

        let activeHighlightDim = -1;
        let dimHighlightLevels = new Array(CONFIG.VERTEX_COUNT).fill(0);

        const radarCanvas = document.getElementById("radarCanvas");
        const ctx = radarCanvas.getContext("2d");
        const pCanvas = document.getElementById("particles-canvas");
        const pCtx = pCanvas.getContext("2d");
        const globalBar = document.getElementById("globalBar");
        const globalTimeline = document.getElementById("globalTimeline");
        const timelineTooltip = document.getElementById("timelineTooltip");
        let particles = [];
        
        function resizeCanvas() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(type = "normal") { 
                this.type = type; 
                this.reset(true); 
            }
            reset(init = false) {
                this.x = Math.random() * pCanvas.width;
                this.isTop = Math.random() > 0.5;
                this.y = this.isTop ? -100 : pCanvas.height + 100;
                if (init) this.y = Math.random() * pCanvas.height;
                
                if (this.type === "normal") {
                    this.vy = (this.isTop ? 1 : -1) * (Math.random() * 1.5 + 0.5);
                    this.vx = (Math.random() - 0.5) * 1;
                    this.size = Math.random() * 2 + 1;
                    this.bloomMult = 10 * CONFIG.PARTICLE_SIZE_MULT; 
                    this.alphaMult = 0.9 * CONFIG.PARTICLE_OPACITY_MULT;
                } else {
                    this.vy = (this.isTop ? 1 : -1) * (Math.random() * 0.4 + 0.2); 
                    this.vx = (Math.random() - 0.5) * 0.5;
                    this.size = Math.random() * 5 + 5; 
                    this.bloomMult = 15 * CONFIG.PARTICLE_SIZE_MULT; 
                    this.alphaMult = 0.25 * CONFIG.PARTICLE_OPACITY_MULT; 
                }
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                let dist = Math.abs(this.y - pCanvas.height/2) / (pCanvas.height/2);
                this.life = dist;
                if (this.life <= 0.05 || this.y < -150 || this.y > pCanvas.height + 150) this.reset();
            }
            draw() {
                pCtx.save();
                pCtx.globalAlpha = Math.max(0, this.life * this.alphaMult * particleFadeLevel);
                let gradSize = this.size * this.bloomMult;
                let gradient = pCtx.createRadialGradient(this.x, this.y, 0, this.x, this.y, gradSize);
                gradient.addColorStop(0, hexToRgbA(currentThemeColor, 0.7));
                gradient.addColorStop(0.3, hexToRgbA(currentThemeColor, 0.2));
                gradient.addColorStop(1, "transparent");
                pCtx.fillStyle = gradient;
                pCtx.beginPath();
                pCtx.arc(this.x, this.y, gradSize, 0, Math.PI * 2);
                pCtx.fill();
                if (this.type === "normal") {
                    pCtx.fillStyle = "#fff";
                    pCtx.beginPath();
                    pCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    pCtx.fill();
                }
                pCtx.restore();
            }
        }
        for(let i = 0; i < 35; i++) particles.push(new Particle("normal"));
        for(let i = 0; i < 15; i++) particles.push(new Particle("nebula"));

        function hexToRgbA(hex, alpha) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `rgba(${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}, ${alpha})` : `rgba(255,255,255,${alpha})`;
        }

        function lerpColor(c1, c2, t) {
            const r1 = parseInt(c1.substring(1, 3), 16);
            const g1 = parseInt(c1.substring(3, 5), 16);
            const b1 = parseInt(c1.substring(5, 7), 16);
            const r2 = parseInt(c2.substring(1, 3), 16);
            const g2 = parseInt(c2.substring(3, 5), 16);
            const b2 = parseInt(c2.substring(5, 7), 16);
            const r = Math.round(r1 + (r2 - r1) * t);
            const g = Math.round(g1 + (g2 - g1) * t);
            const b = Math.round(b1 + (b2 - b1) * t);
            return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
        }

        function updateTimer() {
            let diff = Math.floor(globalCurrentTime / 1000);
            let h = Math.floor(diff / 3600).toString().padStart(2, '0');
            let m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
            let s = (diff % 60).toString().padStart(2, '0');
            document.getElementById("sessionTimer").textContent = `${h}:${m}:${s}`;
        }

        function setProgressBar(duration) {
            // 进度条已移除，保留空函数以防其他地方调用
        }

        /**
         * 调度并执行UI的淡出过渡，然后调用核心切换逻辑
         * @param {Object} game - 即将展示的游戏数据对象
         * @param {boolean} isFirst - 是否是初始首次加载
         */
        function updateUI(game, isFirst = false) {
            const nameEl = document.getElementById(“gameName”);
            const descContainer = document.getElementById(“descContainer”);
            const overallEl = document.getElementById(“overallGrade”);
            const badgesRow = document.getElementById(“gradeBadgesRow”);
            const photoEl = document.getElementById(“gamePhoto”);

            if (!isFirst) {
                nameEl.style.animation = 'none';
                descContainer.style.animation = 'none';
                overallEl.style.animation = 'none';
                nameEl.classList.add(“fade-out”);
                descContainer.classList.add(“fade-out”);
                overallEl.classList.add(“fade-out”);
                badgesRow.style.opacity = “0”;
                photoEl.style.transform = “scale(0.3) translateZ(-500px)”;
                photoEl.style.opacity = “0”;

                setTimeout(() => {
                    performTransition(game, isFirst);
                }, 500);
            } else {
                performTransition(game, isFirst);
            }
        }

        /**
         * 核心的视图与数据切换：更换文字、图片加载、应用主题色及计算雷达图目标分数
         * @param {Object} game - 即将展示的游戏数据对象
         * @param {boolean} isFirst - 是否是初始首次加载
         */
        function performTransition(game, isFirst) {
            const nameEl = document.getElementById(“gameName”);
            const descEl = document.getElementById(“gameDesc”);
            const descContainer = document.getElementById(“descContainer”);
            const overallEl = document.getElementById(“overallGrade”);
            const badgesRow = document.getElementById(“gradeBadgesRow”);
            const photoEl = document.getElementById(“gamePhoto”);
            const featuredContainer = document.getElementById(“featuredBgContainer”);

            targetThemeColor = game.color;
            document.documentElement.style.setProperty('--theme-color', game.color);
            document.documentElement.style.setProperty('--bg-color-1', game.bg1);
            document.documentElement.style.setProperty('--bg-color-2', game.bg2);

            nameEl.classList.remove(“fade-out”);
            descContainer.classList.remove(“fade-out”);
            overallEl.classList.remove(“fade-out”);

            // 填充评级徽章
            badgesRow.innerHTML = '';
            CONFIG.DIM_NAMES.forEach((dimName, i) => {
                const badge = document.createElement('div');
                badge.className = 'grade-badge';
                badge.innerHTML = `
                    <span class=”grade-letter”>${game.grades[i]}</span>
                    <span class=”grade-dim-name”>${dimName}</span>
                `;
                badgesRow.appendChild(badge);
            });
            badgesRow.style.opacity = “1”;

            // 总体评级
            overallEl.textContent = game.overallGrade;

            // 特色游戏底图逻辑
            const isFeatured = featuredList.includes(game.name);
            const oldFeaturedImg = featuredContainer.querySelector(“.featured-bg-image.active”);

            if (oldFeaturedImg) {
                oldFeaturedImg.classList.remove(“active”);
                oldFeaturedImg.classList.add(“exit”);
                setTimeout(() => oldFeaturedImg.remove(), 2000);
            }

            if (isFeatured) {
                const img = document.createElement(“img”);
                img.className = “featured-bg-image”;
                img.src = “”;
                const extensions = ['webp', 'jpg', 'png', 'jpeg'];
                const tryLoadFeatured = (idx) => {
                    if (idx >= extensions.length) return;
                    const testImg = new Image();
                    testImg.onload = () => {
                        img.src = testImg.src;
                        requestAnimationFrame(() => {
                            img.classList.add(“active”);
                        });
                    };
                    testImg.onerror = () => tryLoadFeatured(idx + 1);
                    testImg.src = `./pic/${game.name}1.${extensions[idx]}`;
                };
                tryLoadFeatured(0);
                featuredContainer.appendChild(img);
            }

            if (!isFirst) {
                void nameEl.offsetWidth;
                void descContainer.offsetWidth;
                void overallEl.offsetWidth;
            }

            // 动画：特色游戏从0开始，普通游戏平滑过渡
            if (isFirst || isFeatured) {
                startScores = [...CONFIG.MIN_SCORES];
            } else {
                startScores = [...currentScores];
            }

            targetScores = game.grades.map(g => gradeToPosition(g));
            animProgress = 0;
            animStartTime = performance.now();

            nameEl.textContent = game.name;
            descEl.textContent = game.desc;

            nameEl.style.animation = “nameEntrance 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards”;
            descContainer.style.animation = “descEntrance 1s ease-out 0.3s both”;
            overallEl.style.animation = “overallEntrance 1.2s cubic-bezier(0.23, 1, 0.32, 1) 0.15s forwards”;

            // 根据配置控制介绍内容的可见性
            descContainer.style.display = CONFIG.SHOW_DESC ? “inline-block” : “none”;

            // 优先加载 webp 格式
            const extensions = ['webp', 'jpg', 'png', 'jpeg'];
            const tryLoad = (idx) => {
                if (idx >= extensions.length) {
                    photoEl.style.opacity = “0”;
                    return;
                }
                const imgPath = `./pic/${game.name}.${extensions[idx]}`;
                const tempImg = new Image();
                tempImg.onload = () => {
                    photoEl.src = imgPath;
                    photoEl.style.opacity = “1”;
                    photoEl.style.transform = “rotateY(0) translateZ(0)”;
                };
                tempImg.onerror = () => tryLoad(idx + 1);
                tempImg.src = imgPath;
            };
            tryLoad(0);
        }

        /**
         * 负责在 Canvas 上绘制六维雷达图、背景网格、连接线及其光晕特效
         */
        function drawRadar() {
            const w = radarCanvas.width;   
            const h = radarCanvas.height;  
            const centerX = w / 2;
            const centerY = h / 2;
            
            const maxR = 1000 * 0.4 * CONFIG.RADAR_SCALE; 

            ctx.clearRect(0, 0, w, h);
            ctx.save();
            ctx.lineWidth = CONFIG.RADAR_GRID_LINE_WIDTH;

            // 背景网格 (固定10级基础刻度)，每层都按每个维度的满分计算半径比例
            for (let layer = 1; layer <= CONFIG.RADAR_GRID_LEVELS; layer++) {
                ctx.beginPath();
                for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) {
                    // grid表示满分的比例，比如第10层即 10/10 = 1倍的maxR
                    const r = (layer / CONFIG.RADAR_GRID_LEVELS) * maxR;
                    const angle = (i * (360 / CONFIG.VERTEX_COUNT) - 90) * Math.PI / 180;
                    const x = centerX + r * Math.cos(angle);
                    const y = centerY + r * Math.sin(angle);
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath();
                // 最外层网格线增强2.5倍以突出边界感
                ctx.strokeStyle = `rgba(255, 255, 255, ${layer === CONFIG.RADAR_GRID_LEVELS ? CONFIG.RADAR_GRID_LINE_OPACITY * 2.5 : CONFIG.RADAR_GRID_LINE_OPACITY})`;
                ctx.stroke();
            }

            // 轴向量
            for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) {
                const angle = (i * (360 / CONFIG.VERTEX_COUNT) - 90) * Math.PI / 180;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + maxR * Math.cos(angle), centerY + maxR * Math.sin(angle));
                ctx.strokeStyle = `rgba(255, 255, 255, ${CONFIG.RADAR_GRID_LINE_OPACITY})`;
                ctx.stroke();
            }

            // 雷达多边形 (允许超出 maxR，每个维度的基准线单独映射配置)
            ctx.beginPath();
            let polyPoints = [];
            for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) {
                const dimMaxScore = CONFIG.BASE_MAX_SCORES[i];
                const dimMinScore = CONFIG.MIN_SCORES[i];
                // 根据 MIN_SCORES 计算有效显示范围，MIN_SCORES 对应原点 (0%位置)
                const range = Math.max(0.0001, dimMaxScore - dimMinScore);
                const r = ((currentScores[i] - dimMinScore) / range) * maxR;
                const angle = (i * (360 / CONFIG.VERTEX_COUNT) - 90) * Math.PI / 180;
                const x = centerX + r * Math.cos(angle);
                const y = centerY + r * Math.sin(angle);
                polyPoints.push({x, y});
                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.closePath();
            
            // 基础填充 (稍微增强一点存在感)
            ctx.shadowBlur = 0;
            ctx.fillStyle = hexToRgbA(currentThemeColor, 0.25);
            ctx.fill();

            // 顶点强调内部发光（限制在多边形内部）
            ctx.save();
            ctx.clip(); // 限制后续绘制只在多边形内
            for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) {
                let hl = dimHighlightLevels[i];
                if (hl > 0.01) {
                    const pt = polyPoints[i];
                    // 在对应顶点处绘制径向渐变光晕
                    const glowRadius = maxR * 0.8 * hl;
                    const grad = ctx.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, glowRadius);
                    grad.addColorStop(0, hexToRgbA(currentThemeColor, 0.8 * hl));
                    grad.addColorStop(1, hexToRgbA(currentThemeColor, 0));
                    ctx.fillStyle = grad;
                    ctx.fill(); 
                }
            }
            ctx.restore();

            // 雷达边缘光晕效果 - 简化为两层
            ctx.save();
            ctx.lineJoin = "round";
            ctx.lineCap = "round";

            // 1. 柔和环境光晕
            ctx.shadowBlur = 50;
            ctx.shadowColor = currentThemeColor;
            ctx.strokeStyle = currentThemeColor;
            ctx.lineWidth = 3;
            ctx.stroke();

            // 2. 核心亮白色高光
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#fff";
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 1;
            ctx.stroke();

            ctx.restore();

            // 维度标签和评级
            ctx.fillStyle = '#fff';
            for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) {
                const angle = (i * (360 / CONFIG.VERTEX_COUNT) - 90) * Math.PI / 180;
                let hl = dimHighlightLevels[i];
                let marginOffset = hl * 20;
                let x = centerX + (maxR + CONFIG.LABEL_MARGIN + marginOffset) * Math.cos(angle);
                let y = centerY + (maxR + CONFIG.LABEL_MARGIN + marginOffset) * Math.sin(angle);
                ctx.textAlign = Math.abs(Math.cos(angle)) < 0.1 ? 'center' : (Math.cos(angle) > 0 ? 'left' : 'right');
                ctx.textBaseline = 'middle';

                ctx.save();
                if (hl > 0.01) {
                    ctx.shadowBlur = 15 + hl * 15;
                    ctx.shadowColor = currentThemeColor;
                    ctx.fillStyle = "#fff";
                }

                const gradeLetter = getGradeLabel(i);
                const fontSize = CONFIG.LABEL_FONT_SIZE + hl * 12;
                // 维度名称在上
                ctx.font = `bold ${fontSize}px "Orbitron", "HarmonyOS Sans SC", sans-serif`;
                ctx.fillText(CONFIG.DIM_NAMES[i], x, y - 16 - hl * 4);
                // 字母评级在下
                ctx.font = `900 ${fontSize + 6}px "Orbitron", sans-serif`;
                ctx.fillText(gradeLetter, x, y + 18 + hl * 4);
                ctx.restore();
            }
            ctx.restore();
        }

        /**
         * 引擎的核心帧循环（游戏循环）
         * 负责：1. 处理全局的时间线与播放状态; 2. 颜色插值平滑渐变; 3. 处理得分切换的缓动动画; 4. 触发Canvas绘图更新
         * @param {number} timestamp - 配合requestAnimationFrame注入的当前帧高精时间戳
         */
        function tick(timestamp) {
            if (!lastTimestamp) lastTimestamp = timestamp;
            const deltaTime = timestamp - lastTimestamp;
            lastTimestamp = timestamp;

            // 1. 全局进度逻辑
            if (!isPaused && globalCurrentTime < totalDuration) {
                globalCurrentTime += deltaTime;
                if (globalCurrentTime >= totalDuration) {
                    globalCurrentTime = totalDuration;
                    isPaused = true; // 播放结束
                }

                // 更新全局进度条展示
                const progressPer = (globalCurrentTime / totalDuration) * 100;
                globalBar.style.width = progressPer + "%";

                // 检查是否需要切换游戏
                const currentSegment = timeSegments.find(s => globalCurrentTime >= s.start && globalCurrentTime < s.end);
                if (currentSegment && currentSegment.gameIndex !== currentIndex) {
                    currentIndex = currentSegment.gameIndex;
                    updateUI(games[currentIndex], currentIndex === 0 && globalCurrentTime < 1000);
                }
            }

            // 2. 颜色平滑过渡
            if (currentThemeColor !== targetThemeColor) {
                currentThemeColor = lerpColor(currentThemeColor, targetThemeColor, 0.02);
            }

            // 3. 雷达数值动画
            if (animProgress < 1) {
                const elapsed = performance.now() - animStartTime;
                let t = Math.min(elapsed / ANIM_DURATION, 1);
                t = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) currentScores[i] = (1 - t) * startScores[i] + t * targetScores[i];
                if (t >= 1) animProgress = 1;
            }

            // 顶点强调动画
            for (let i = 0; i < CONFIG.VERTEX_COUNT; i++) {
                const targetLevel = (i === activeHighlightDim) ? 1 : 0;
                dimHighlightLevels[i] += (targetLevel - dimHighlightLevels[i]) * Math.min(deltaTime * 0.01, 1);
            }

            // 粒子淡入淡出动画 (1000ms 过渡)
            const targetFade = isParticlesEnabled ? 1 : 0;
            if (particleFadeLevel !== targetFade) {
                const fadeStep = deltaTime / 1000;
                if (particleFadeLevel < targetFade) {
                    particleFadeLevel = Math.min(1, particleFadeLevel + fadeStep);
                } else {
                    particleFadeLevel = Math.max(0, particleFadeLevel - fadeStep);
                }
            }

            // 4. 渲染
            if (particleFadeLevel > 0) {
                pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
            } else {
                pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            }
            drawRadar();
            updateTimer();
            requestAnimationFrame(tick);
        }

        // 全局进度条拖动逻辑
        globalTimeline.addEventListener('mouseenter', () => {
             timelineTooltip.style.display = 'block';
        });

        globalTimeline.addEventListener('mousedown', (e) => {
            isGlobalTimelineDragging = true;
            timelineTooltip.style.display = 'block';
            updateGlobalTimeFromClick(e);
        });

        window.addEventListener('mousemove', (e) => {
            // 获取相对于 timeline 的坐标
            const rect = globalTimeline.getBoundingClientRect();
            const isInTimeline = (e.clientY >= rect.top && e.clientY <= rect.bottom);
            
            if (isInTimeline || isGlobalTimelineDragging) {
                const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
                const per = x / rect.width;
                const previewTime = per * totalDuration;
                
                // 找到预览时间对应的游戏
                const previewSegment = timeSegments.find(s => previewTime >= s.start && previewTime <= s.end);
                const previewGameName = previewSegment ? games[previewSegment.gameIndex].name : "";

                const diff = Math.floor(previewTime / 1000);
                const m = Math.floor(diff / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');

                timelineTooltip.style.left = `${e.clientX - 25}px`;
                timelineTooltip.innerHTML = `<div style="font-size:0.7rem; opacity:0.8; font-family:'HarmonyOS Sans SC'">${previewGameName}</div>${m}:${s}`;
                timelineTooltip.style.display = 'block';
            } else if (!isGlobalTimelineDragging) {
                timelineTooltip.style.display = 'none';
            }

            if (isGlobalTimelineDragging) updateGlobalTimeFromClick(e);
        });

        globalTimeline.addEventListener('mouseleave', () => {
            if (!isGlobalTimelineDragging) timelineTooltip.style.display = 'none';
        });

        window.addEventListener('mouseup', () => {
            isGlobalTimelineDragging = false;
            timelineTooltip.style.display = 'none';
        });

        function updateGlobalTimeFromClick(e) {
            const rect = globalTimeline.getBoundingClientRect();
            const x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
            const per = x / rect.width;
            globalCurrentTime = per * totalDuration;
            
            // 同步音频进度
            const audio = document.getElementById("bgMusic");
            if (audio && audio.duration) {
                audio.currentTime = (globalCurrentTime / 1000) % audio.duration;
            }

            // 立即检查并切换
            const currentSegment = timeSegments.find(s => globalCurrentTime >= s.start && globalCurrentTime <= s.end);
            if (currentSegment && currentSegment.gameIndex !== currentIndex) {
                currentIndex = currentSegment.gameIndex;
                updateUI(games[currentIndex], false);
            }
            if (globalCurrentTime < totalDuration) {
                isPaused = false;
                if (audio) audio.play().catch(() => {});
            }
        }

        window.addEventListener("keydown", (e) => {
            // 数字键强调效果 (1-8 键，0 键取消)
            if (e.key >= '1' && e.key <= '8') {
                const dimIndex = parseInt(e.key) - 1;
                if (dimIndex < CONFIG.VERTEX_COUNT) {
                    activeHighlightDim = dimIndex;
                }
            } else if (e.key === '0') {
                activeHighlightDim = -1;
            }

            if (e.key === "f" || e.key === "F" || e.key === "F11") {
                // 如果是 F11，阻止默认行为以使用我们自定义的全屏逻辑控制 UI 隐藏
                if (e.key === "F11") e.preventDefault();
                
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                }
            }

            const audio = document.getElementById("bgMusic");
            if (e.key.toLowerCase() === 'p') {
                isParticlesEnabled = !isParticlesEnabled;
                if (isParticlesEnabled) {
                    document.body.classList.remove("particles-disabled");
                } else {
                    document.body.classList.add("particles-disabled");
                }
            }
            if (e.key === " ") { // 空格暂停/播放 或 开始准备页
                if (!isStarted) {
                    isStarted = true;
                    startIntroSystem(); // 开始准备系统
                    return;
                }
                isPaused = !isPaused;
                if (audio) {
                    if (isPaused) audio.pause();
                    else audio.play().catch(() => {});
                }
            } else if (e.key === "ArrowLeft") {
                const nextIdx = Math.max(0, currentIndex - 1);
                globalCurrentTime = timeSegments[nextIdx].start;
                if (audio) {
                    audio.currentTime = globalCurrentTime / 1000;
                    audio.play().catch(() => {});
                }
                isPaused = false;
            } else if (e.key === "ArrowRight") {
                const nextIdx = Math.min(games.length - 1, currentIndex + 1);
                globalCurrentTime = timeSegments[nextIdx].start;
                if (audio) {
                    audio.currentTime = globalCurrentTime / 1000;
                    audio.play().catch(() => {});
                }
                isPaused = false;
            }
        });

        function startIntroSystem() {
            const audio = document.getElementById("bgMusic");
            const overlay = document.getElementById("introOverlay");
            const pCanvas = document.getElementById("particles-canvas");

            // 移除提示文字
            overlay.classList.add("started"); 

            // 在等待 3 秒期间，静默“播放再暂停”以绕过浏览器策略，但不发出声音
            if (audio) {
                audio.muted = true;
                audio.play().then(() => {
                    audio.pause();
                    audio.muted = false;
                    audio.currentTime = 0;
                }).catch(e => console.log("Audio prep failed", e));
            }

            setTimeout(() => {
                overlay.style.opacity = "0";
                isPaused = false; 
                pCanvas.style.zIndex = "0"; 

                if (audio) {
                    audio.play().catch(e => console.log("Audio play failed", e));
                }
                setTimeout(() => {
                    overlay.style.display = "none";
                }, 1000);
            }, CONFIG.INTRO_WAIT_TIME);
        }

        window.onload = function() {
            // 在正式播放前就开始渲染粒子和雷达（静态背景）
            requestAnimationFrame(tick);

            // 拖拽图片下载功能
            window.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'copy';
            });

            window.addEventListener('drop', (e) => {
                e.preventDefault();
                const files = e.dataTransfer.files;
                if (files.length > 0 && currentIndex >= 0) {
                    const file = files[0];
                    if (file.type.startsWith('image/')) {
                        const currentGameName = games[currentIndex].name;
                        const extension = file.name.split('.').pop();
                        const newFileName = `${currentGameName}.${extension}`;

                        const reader = new FileReader();
                        reader.onload = (event) => {
                            const link = document.createElement('a');
                            link.href = event.target.result;
                            link.download = newFileName;
                            document.body.appendChild(link);
                            link.click();
                            document.body.removeChild(link);
                        };
                        reader.readAsDataURL(file);
                    }
                }
            });
        };
    </script>
